openapi: 3.0.3
info:
  title: Alfa API Digital Ruble
  version: 1.0.0
tags:
  - name: WalletContext
  - name: Statement
  - name: Certificates
paths:
  /api/jp/v1/digital-ruble/wallet-context:
    get:
      tags:
        - WalletContext
      operationId: getWalletContext
      parameters:
        - $ref: '#/components/parameters/XClientId'
        - $ref: '#/components/parameters/XCus'
        - $ref: '#/components/parameters/XAcus'
      responses:
        '200':
          description: Wallet context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletContextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/jp/v1/digital-ruble/certificates:
    get:
      tags:
        - Certificates
      operationId: getCertificates
      parameters:
        - $ref: '#/components/parameters/XClientId'
        - $ref: '#/components/parameters/XCus'
        - $ref: '#/components/parameters/XAcus'
      responses:
        '200':
          description: Certificates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificatesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/jp/v1/digital-ruble/statement/transactions:
    post:
      tags:
        - Statement
      operationId: getStatementTransactions
      parameters:
        - $ref: '#/components/parameters/XClientId'
        - $ref: '#/components/parameters/XCus'
        - $ref: '#/components/parameters/XAcus'
        - $ref: '#/components/parameters/XSub'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatementRequest'
      responses:
        '200':
          description: Statement transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementTransactionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  parameters:
    XClientId:
      in: header
      name: X-ClientId
      schema:
        type: string
    XCus:
      in: header
      name: X-Cus
      schema:
        type: string
    XAcus:
      in: header
      name: X-Acus
      schema:
        type: string
    XSub:
      in: header
      name: X-Sub
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    WalletContextResponse:
      type: object
      required:
        - participantId
        - participantWalletId
        - devices
      properties:
        participantId:
          type: string
        participantWalletId:
          type: string
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceProfile'
    CertificatesResponse:
      type: object
      required:
        - rcdOfBankOfRussia
        - rcdOfBank
        - certificateOfBankOfRussiaCertificationCenter
        - certificateOfBankCertificationCenter
        - certificateBankProcessing
      properties:
        rcdOfBankOfRussia:
          type: array
          items:
            type: string
        rcdOfBank:
          type: array
          items:
            type: string
        certificateOfBankOfRussiaCertificationCenter:
          type: array
          items:
            type: string
        certificateOfBankCertificationCenter:
          type: array
          items:
            type: string
        certificateBankProcessing:
          type: array
          items:
            type: string
    DeviceProfile:
      type: object
      required:
        - deviceId
        - fingerprint
        - certificate
        - certificateSerialNumber
      properties:
        deviceId:
          type: string
        fingerprint:
          type: string
        certificate:
          type: string
        certificateSerialNumber:
          type: string
    StatementRequest:
      type: object
      required:
        - deviceId
        - fingerprint
        - participantId
        - participantWalletId
        - cbdcMessage
        - historyFilters
      properties:
        deviceId:
          type: string
          minLength: 1
        fingerprint:
          type: string
          minLength: 1
        participantId:
          type: string
          minLength: 1
        participantWalletId:
          type: string
          minLength: 1
        cbdcMessage:
          type: string
          minLength: 1
        historyFilters:
          $ref: '#/components/schemas/HistoryFilters'
        pagination:
          $ref: '#/components/schemas/StatementPaginationRequest'
    HistoryFilters:
      type: object
      required:
        - periodFrom
        - periodTo
      properties:
        periodFrom:
          type: string
          format: date
        periodTo:
          type: string
          format: date
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        direction:
          $ref: '#/components/schemas/Direction'
    TransactionType:
      type: string
      enum:
        - BUY
        - SELL
        - C2B
        - B2C
        - B2B
        - REFUND_DC
        - OP_TRANSFER
        - OTHER_OPERATION
        - B2G
        - G2B
    Direction:
      type: string
      enum:
        - INCOMING
        - OUTGOING
    StatementResponse:
      type: object
      properties:
        cbdcMessage:
          type: string
        openingBalance:
          type: string
        outgoingBalance:
          type: string
        participantId:
          type: string
        participantWalletId:
          type: string
        historyFilters:
          $ref: '#/components/schemas/HistoryFilters'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
    StatementTransactionsResponse:
      type: object
      required:
        - pagination
        - statement
      properties:
        pagination:
          $ref: '#/components/schemas/StatementPaginationResponse'
        statement:
          $ref: '#/components/schemas/StatementResponse'
    StatementPaginationRequest:
      type: object
      properties:
        limit:
          type: integer
          format: int32
          default: 10
          minimum: 1
        offset:
          type: integer
          format: int32
          default: 0
          minimum: 0
    StatementPaginationResponse:
      type: object
      required:
        - limit
        - offset
        - totalCount
      properties:
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int64
    Transaction:
      type: object
      properties:
        transactionId:
          type: string
        transactionDate:
          type: string
          format: date-time
        status:
          type: string
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        direction:
          $ref: '#/components/schemas/Direction'
        amount:
          type: string
        currency:
          type: string
        operationId:
          type: string
        createdAt:
          type: string
          format: date-time
        purpose:
          type: string
        clientAccountNumber:
          type: string
        clientDcAccountNumber:
          type: string
        contractorInfo:
          $ref: '#/components/schemas/ContractorInfo'
        intermediaryBank:
          $ref: '#/components/schemas/IntermediaryBank'
        merchantInfo:
          $ref: '#/components/schemas/MerchantInfo'
        paymentInfo:
          $ref: '#/components/schemas/PaymentInfo'
        authorizationId:
          type: string
        registry:
          $ref: '#/components/schemas/Registry'
    ContractorInfo:
      type: object
      properties:
        name:
          type: string
        factRecipientName:
          type: string
        factRecipientAccount:
          type: string
        dcAccountNumber:
          type: string
        walletId:
          type: string
        inn:
          type: string
        kpp:
          type: string
        ogrn:
          type: string
    IntermediaryBank:
      type: object
      properties:
        name:
          type: string
        bic:
          type: string
    MerchantInfo:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
        mcc:
          type: string
    PaymentInfo:
      type: object
      properties:
        referenceId:
          type: string
        paymentLink:
          $ref: '#/components/schemas/PaymentLink'
        incomeCode:
          type: string
        paymentCode:
          type: string
        paymentCodeDescription:
          type: string
        paymentId:
          type: string
    PaymentLink:
      type: object
      properties:
        paymentLinkId:
          type: string
        paymentLinkType:
          type: string
        paymentLinkParameters:
          type: string
    Registry:
      type: object
      properties:
        operationId:
          type: string
        collectedAmount:
          type: string
        currency:
          type: string
        incomeCode:
          type: string
        priority:
          type: string
        remittanceInformation:
          $ref: '#/components/schemas/RemittanceInformation'
    RemittanceInformation:
      type: object
      properties:
        debtorReferenceInformation:
          $ref: '#/components/schemas/DebtorReferenceInformation'
    DebtorReferenceInformation:
      type: object
      properties:
        type:
          type: string
        reference:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
        - error_description
      properties:
        error:
          type: string
        error_description:
          type: string
